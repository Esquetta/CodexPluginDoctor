name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build CLI
        run: npm run build

      - name: Generate validation summary
        run: node dist/cli.js check tests/fixtures/valid-plugin-with-mcp --markdown --output codex-plugin-doctor-summary.md

      - name: Publish validation summary
        if: always()
        shell: bash
        run: cat codex-plugin-doctor-summary.md >> "$GITHUB_STEP_SUMMARY"
