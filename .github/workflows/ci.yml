name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

env:
  VALIDATION_TARGET: examples/codex-doctor-runtime
  VALIDATION_RUNTIME_TARGET: examples/codex-doctor-runtime
  VALIDATION_OUT_DIR: validation-artifacts
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build CLI
        run: npm run build

      - name: Generate validation reports
        run: >
          node scripts/generate-validation-artifacts.mjs
          --target ${{ env.VALIDATION_TARGET }}
          --runtime-target ${{ env.VALIDATION_RUNTIME_TARGET }}
          --out-dir ${{ env.VALIDATION_OUT_DIR }}

      - name: Publish validation summary
        if: always()
        shell: bash
        run: cat "${VALIDATION_OUT_DIR}/codex-plugin-doctor-summary.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload validation artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: codex-plugin-doctor-reports
          path: |
            ${{ env.VALIDATION_OUT_DIR }}/codex-plugin-doctor-summary.md
            ${{ env.VALIDATION_OUT_DIR }}/codex-plugin-doctor-report.json
            ${{ env.VALIDATION_OUT_DIR }}/codex-plugin-doctor-runtime-report.json
            ${{ env.VALIDATION_OUT_DIR }}/codex-plugin-doctor.sarif
