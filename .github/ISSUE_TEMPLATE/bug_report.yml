name: Bug report
description: Report a reproducible problem in Codex Plugin Doctor.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Please include enough detail to reproduce the behavior locally.
  - type: input
    id: version
    attributes:
      label: Version
      description: Run `codex-plugin-doctor --version` if available, or provide the git commit.
      placeholder: 1.0.0
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command
      description: Paste the exact command you ran.
      render: shell
    validations:
      required: true
  - type: textarea
    id: doctor-snapshot
    attributes:
      label: Doctor snapshot
      description: If possible, paste `codex-plugin-doctor doctor snapshot --json` output with local paths or secrets redacted.
      render: json
  - type: textarea
    id: observed
    attributes:
      label: Observed behavior
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: fixture
    attributes:
      label: Minimal fixture or package shape
      description: If possible, describe the smallest plugin/skill/MCP package that reproduces the issue.
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, Node version, package manager, terminal shell, and whether this came from npm global install, npm link, or source.
      render: text
