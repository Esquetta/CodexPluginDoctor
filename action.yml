name: Codex Plugin Doctor
description: Validate Codex plugin packages in GitHub Actions.

inputs:
  version:
    description: codex-plugin-doctor npm version to install.
    required: false
    default: "latest"
  path:
    description: Path to the Codex plugin package root.
    required: false
    default: "."
  runtime:
    description: Run optional MCP runtime probing.
    required: false
    default: "false"
  installed:
    description: Validate plugins from the local Codex plugin cache.
    required: false
    default: "false"
  filter:
    description: Optional installed plugin name/path filter.
    required: false
    default: ""
  config:
    description: Optional path to .codex-doctor.json.
    required: false
    default: ""
  history:
    description: Optional JSONL path for validation history output.
    required: false
    default: ""
  policy:
    description: Optional policy preset to apply. Supported values are codex-publish, mcp-strict, and security.
    required: false
    default: ""
  profile:
    description: Optional check profile to apply. Supported values are ci, strict, and publish.
    required: false
    default: ""
  output-dir:
    description: Directory where JSON, Markdown, and SARIF reports are written.
    required: false
    default: codex-plugin-doctor-reports
  artifact-name:
    description: GitHub Actions artifact name for uploaded report files.
    required: false
    default: codex-plugin-doctor-reports
  upload-artifact:
    description: Upload the generated report directory as a workflow artifact.
    required: false
    default: "true"
  step-summary:
    description: Append the Markdown report to the GitHub Actions step summary.
    required: false
    default: "true"
  json:
    description: Write a machine-readable JSON report into the output directory.
    required: false
    default: "true"
  markdown:
    description: Write a CI-friendly Markdown summary into the output directory.
    required: false
    default: "true"
  sarif:
    description: Write SARIF output into the output directory.
    required: false
    default: "false"
  corpus:
    description: Write bundled validation corpus JSON into the output directory.
    required: false
    default: "false"
  contract:
    description: Write public output contract JSON into the output directory.
    required: false
    default: "false"
  review-bundle:
    description: Write a signed review bundle directory into the output directory.
    required: false
    default: "false"
  review-bundle-dir:
    description: Directory name for the generated review bundle inside output-dir.
    required: false
    default: review-bundle
  review-bundle-verify:
    description: Verify the generated review bundle and write a verification JSON report.
    required: false
    default: "false"
  signing-key-env:
    description: Environment variable name that contains the local HMAC signing key for review bundle artifacts.
    required: false
    default: CODEX_PLUGIN_DOCTOR_SIGNING_KEY
  review-bundle-allow-dirty:
    description: Allow dirty git worktrees when generating review bundle release evidence.
    required: false
    default: "false"
  review-bundle-allow-untagged:
    description: Allow untagged commits when generating review bundle release evidence.
    required: false
    default: "true"

outputs:
  status:
    description: Exit status returned by the primary validation run.
    value: ${{ steps.run-doctor.outputs.status }}
  report-dir:
    description: Directory containing generated Codex Plugin Doctor reports.
    value: ${{ steps.run-doctor.outputs.report-dir }}
  summary-path:
    description: Path to the generated Markdown summary report.
    value: ${{ steps.run-doctor.outputs.summary-path }}
  json-path:
    description: Path to the generated JSON report.
    value: ${{ steps.run-doctor.outputs.json-path }}
  sarif-path:
    description: Path to the generated SARIF report when sarif is enabled.
    value: ${{ steps.run-doctor.outputs.sarif-path }}
  validation-corpus-path:
    description: Path to the generated validation corpus JSON report when corpus is enabled.
    value: ${{ steps.run-doctor.outputs.validation-corpus-path }}
  output-contract-path:
    description: Path to the generated output contract JSON report when contract is enabled.
    value: ${{ steps.run-doctor.outputs.output-contract-path }}
  review-bundle-path:
    description: Path to the generated review bundle directory when review-bundle is enabled.
    value: ${{ steps.run-doctor.outputs.review-bundle-path }}
  review-bundle-verification-path:
    description: Path to the generated review bundle verification report when review-bundle-verify is enabled.
    value: ${{ steps.run-doctor.outputs.review-bundle-verification-path }}

runs:
  using: composite
  steps:
    - name: Install Codex Plugin Doctor
      shell: bash
      run: npm install -g codex-plugin-doctor@${{ inputs.version }}

    - name: Run Codex Plugin Doctor
      id: run-doctor
      shell: bash
      run: |
        set -euo pipefail

        report_dir="${{ inputs['output-dir'] }}"
        summary_path="$report_dir/codex-plugin-doctor-summary.md"
        json_path="$report_dir/codex-plugin-doctor-report.json"
        sarif_path="$report_dir/codex-plugin-doctor.sarif"
        validation_corpus_path="$report_dir/validation-corpus.json"
        output_contract_path="$report_dir/output-contract.json"
        review_bundle_path="$report_dir/${{ inputs['review-bundle-dir'] }}"
        review_bundle_verification_path="$report_dir/review-bundle-verification.json"
        status_file="${RUNNER_TEMP:-.}/codex-plugin-doctor-status"
        status=0

        mkdir -p "$report_dir"

        args=(check)
        history_args=()

        if [[ "${{ inputs.installed }}" == "true" ]]; then
          args+=(--installed)
          if [[ -n "${{ inputs.filter }}" ]]; then
            args+=("${{ inputs.filter }}")
          fi
        else
          args+=("${{ inputs.path }}")
        fi

        if [[ "${{ inputs.runtime }}" == "true" ]]; then
          args+=(--runtime)
        fi

        if [[ -n "${{ inputs.config }}" ]]; then
          args+=(--config "${{ inputs.config }}")
        fi

        if [[ -n "${{ inputs.history }}" ]]; then
          history_args+=(--history "${{ inputs.history }}")
        fi

        if [[ -n "${{ inputs.policy }}" ]]; then
          args+=(--policy "${{ inputs.policy }}")
        fi

        if [[ -n "${{ inputs.profile }}" ]]; then
          args+=(--profile "${{ inputs.profile }}")
        fi

        record_status() {
          local code="$1"

          if [[ "$code" -ne 0 && "$status" -eq 0 ]]; then
            status="$code"
          fi
        }

        run_doctor() {
          local label="$1"
          shift

          echo "::group::$label"
          set +e
          codex-plugin-doctor "$@"
          local code="$?"
          set -e

          if [[ "$code" -ne 0 ]]; then
            echo "Codex Plugin Doctor ${label} exited with status ${code}."
          fi

          echo "::endgroup::"
          record_status "$code"
        }

        run_doctor "check" "${args[@]}" "${history_args[@]}" --no-animations

        if [[ "${{ inputs.json }}" == "true" ]]; then
          run_doctor "json report" "${args[@]}" --json --output "$json_path"
        fi

        if [[ "${{ inputs.markdown }}" == "true" ]]; then
          run_doctor "markdown summary" "${args[@]}" --markdown --output "$summary_path"
        fi

        if [[ "${{ inputs.sarif }}" == "true" ]]; then
          run_doctor "sarif report" "${args[@]}" --sarif --output "$sarif_path"
        fi

        if [[ "${{ inputs.corpus }}" == "true" ]]; then
          run_doctor "validation corpus" doctor corpus --json --output "$validation_corpus_path"
        fi

        if [[ "${{ inputs.contract }}" == "true" ]]; then
          run_doctor "output contract" doctor contract --json --output "$output_contract_path"
        fi

        if [[ "${{ inputs['review-bundle'] }}" == "true" ]]; then
          signing_key_env="${{ inputs['signing-key-env'] }}"

          if [[ "${{ inputs.installed }}" == "true" ]]; then
            echo "Review bundle generation requires a single package path, not installed-cache mode."
            record_status 2
          elif [[ -z "$signing_key_env" ]]; then
            echo "Review bundle generation requires signing-key-env."
            record_status 2
          elif [[ -z "${!signing_key_env:-}" ]]; then
            echo "Review bundle signing key environment variable is not set: ${signing_key_env}"
            record_status 2
          else
            review_bundle_args=(doctor review-bundle "${{ inputs.path }}" --output "$review_bundle_path" --sign-key-env "$signing_key_env")

            if [[ "${{ inputs['review-bundle-allow-dirty'] }}" == "true" ]]; then
              review_bundle_args+=(--allow-dirty)
            fi

            if [[ "${{ inputs['review-bundle-allow-untagged'] }}" == "true" ]]; then
              review_bundle_args+=(--allow-untagged)
            fi

            run_doctor "review bundle" "${review_bundle_args[@]}"

            if [[ "${{ inputs['review-bundle-verify'] }}" == "true" ]]; then
              run_doctor "review bundle verification" doctor review-bundle verify "$review_bundle_path" --target "${{ inputs.path }}" --sign-key-env "$signing_key_env" --json --output "$review_bundle_verification_path"
            fi
          fi
        fi

        printf "%s" "$status" > "$status_file"

        {
          echo "status=$status"
          echo "report-dir=$report_dir"
          echo "summary-path=$summary_path"
          echo "json-path=$json_path"
          echo "sarif-path=$sarif_path"
          echo "validation-corpus-path=$validation_corpus_path"
          echo "output-contract-path=$output_contract_path"
          echo "review-bundle-path=$review_bundle_path"
          echo "review-bundle-verification-path=$review_bundle_verification_path"
        } >> "$GITHUB_OUTPUT"

    - name: Publish Codex Plugin Doctor summary
      if: ${{ always() && inputs['step-summary'] == 'true' }}
      shell: bash
      run: |
        set -euo pipefail

        report_dir="${{ inputs['output-dir'] }}"
        summary_path="$report_dir/codex-plugin-doctor-summary.md"
        status_file="${RUNNER_TEMP:-.}/codex-plugin-doctor-status"
        status="unknown"

        if [[ -f "$status_file" ]]; then
          status="$(cat "$status_file")"
        fi

        if [[ -n "${GITHUB_STEP_SUMMARY:-}" && -f "$summary_path" ]]; then
          cat "$summary_path" >> "$GITHUB_STEP_SUMMARY"
          exit 0
        fi

        if [[ -n "${GITHUB_STEP_SUMMARY:-}" ]]; then
          {
            echo "## Codex Plugin Doctor"
            echo ""
            echo "- Exit status: ${status}"
            echo "- Report directory: \`${report_dir}\`"
          } >> "$GITHUB_STEP_SUMMARY"
        fi

    - name: Upload Codex Plugin Doctor reports
      if: ${{ always() && inputs['upload-artifact'] == 'true' }}
      uses: actions/upload-artifact@v7
      env:
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      with:
        name: ${{ inputs['artifact-name'] }}
        path: ${{ inputs['output-dir'] }}
        if-no-files-found: ignore

    - name: Complete Codex Plugin Doctor
      if: always()
      shell: bash
      run: |
        set -euo pipefail

        status_file="${RUNNER_TEMP:-.}/codex-plugin-doctor-status"
        status=1

        if [[ -f "$status_file" ]]; then
          status="$(cat "$status_file")"
        fi

        exit "$status"
